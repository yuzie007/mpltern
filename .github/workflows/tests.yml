name: Tests

on:
  push:
    branches:
    - '*'

jobs:
  test:

    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10"]
        matplotlib-version: [3.4.0, 3.5.0, 3.6.0, 3.7.0, 3.8.0, 3.9.0, 3.10.0]
        include:
          - python-version: '3.11'
            matplotlib-version: 3.11.0

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install OS dependencies
        run: |
          sudo apt-get update -yy
          sudo apt-get install -yy \
            inkscape
      - name: Install Python dependencies
        run: |
          # Upgrade pip and setuptools and wheel to get as clean an install as
          # possible.
          python -m pip install --upgrade pip setuptools wheel

          python -m pip install numpy==1.26.4
          python -m pip install matplotlib==${{ matrix.matplotlib-version }}
          python -m pip install pytest>=4.6
          python -m pip install pytest-cov
          python -m pip install codecov coverage
      - name: Run pytest
        run: |
          python -mpytest -ra \
          --cov=./ --log-level=DEBUG --color=yes
      - name: Upload code coverage
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354  # v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
